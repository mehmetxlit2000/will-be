<html lang="tr">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Takip Paneli</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 20px; }
        .container { max-width: 450px; margin: auto; }
        #dataList, #msgList { margin-bottom: 20px; max-height: 300px; overflow-y: auto; }
        .mesaj-kutusu { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #5c67f2; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .mesaj-kutusu img { width: 30px; }
        .info { flex: 1; line-height: 1.6; }
        .del-btn { max-width: 50px; background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .logo-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .platform-btn { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; text-align: center; transition: 0.3s; }
        .platform-btn img { width: 24px; vertical-align: middle; }
        .platform-btn.active { border-color: #5c67f2; background: #f0f2ff; }
        .input-row { display: flex; gap: 5px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        select { padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        .btn-container { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; background: #5c67f2; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .multi-btn { background: #27ae60; }
        .chat-input { display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 5px; margin-top: 10px; }
    </style>
</head>

<div class="container">
    <h3 style="text-align: center;">Hesaplar (<span id="accCount">0</span>)</h3>
    <div id="dataList"></div>
    <div class="panel">
        <h3>Hesap Girişi</h3>
        <div class="logo-group">

            </div>

        </div>
        <input type="hidden" id="selectedPlatform" value="Google">
        <div class="input-row">
            <input type="text" id="usernameInput" placeholder="Kullanıcı adı">
            <select id="domainSelect">
                <option value="@gmail.com">@gmail.com</option>
                <option value="@outlook.com">@outlook.com</option>
                <option value="@sharklasers.com">@sharklasers.com</option>
                <option value="@hotmail.com">@hotmail.com</option>
                <option value="@yahoo.com">@yahoo.com</option>
                <option value="@icloud.com">@icloud.com</option>
                <option value="@live.com">@live.com</option>
                <option value="@yandex.com">@yandex.com</option>
                <option value="@mail.ru">@mail.ru</option>
                <option value="@gmx.com">@gmx.com</option>
            </select>
        </div>
        <input type="text" id="passwordInput" list="passwordList" placeholder="Şifre...">
        <datalist id="passwordList">
            <option value="malkafam98"><option value="haydo388"><option value="salakkafam98"><option value="aptalkafam98"><option value="haydar388">
        </datalist>
        <div class="btn-container">
            <button id="sendBtn">Gönder</button>
            <button id="sendMultiBtn" class="multi-btn">Hepsine Gönder</button>
        </div>
        <div class="chat-input">
            <input type="text" id="chatMsg" placeholder="Mesaj yaz...">
            <button id="sendChatBtn" style="height: 40px; flex:0; padding:0 20px;">Gönder</button>
        </div>
    </div>
    <h3>Mesajlar</h3>
    <div id="msgList"></div>
</div>
